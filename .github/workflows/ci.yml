name: ci
on:
  pull_request:
  push:
    branches: [main]

jobs:
  core:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: core } }
    services:
      postgres:
        image: postgres:16
        env: { POSTGRES_USER: wave, POSTGRES_PASSWORD: wave, POSTGRES_DB: wave }
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U wave" --health-interval 5s
          --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: "clippy, rustfmt" }
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo test

  server:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: server } }
    services:
      postgres:
        image: postgres:16
        env: { POSTGRES_USER: wave, POSTGRES_PASSWORD: wave, POSTGRES_DB: wave }
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U wave" --health-interval 5s
          --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: server/package-lock.json }
      - run: npm ci
      - run: npm run lint
      - run: npm test

  web:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: web } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: web/package-lock.json }
      - run: npm ci
      - run: npm run lint
      - run: npm test

  itest:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env: { POSTGRES_USER: wave, POSTGRES_PASSWORD: wave, POSTGRES_DB: wave }
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U wave" --health-interval 5s
          --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm ci
        working-directory: server
      - run: npm ci
        working-directory: itest
      - run: cargo build
        working-directory: core
      - run: npm run itest
        working-directory: itest
