# PR gate: terraform plan for any change under infra/, posted as a sticky PR comment.
# Auth: Workload Identity Federation, same three repo secrets as deploy-images (ISS-006 / issue #4),
# plus roles/storage.objectViewer on the TF state bucket for the CI service account.
#
# The plan runs with -refresh=false -lock=false on purpose: it diffs CONFIG against RECORDED STATE
# only, so the CI SA never touches live resources or secret payloads and needs no project roles.
# Live drift is invisible here; a human `terraform plan` before apply remains the source of truth.
name: terraform-plan

on:
  pull_request:
    paths: ["infra/**"]

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  ENV_DIR: infra/envs/demo

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      # secrets context is unavailable in job-level `if`; gate via a step output instead,
      # so PRs skip cleanly (with a notice) until the WIF setup exists.
      - name: Check CI secrets configured
        id: wif
        run: echo "configured=${{ secrets.GCP_WIF_PROVIDER != '' && secrets.GCP_CI_SA != '' && secrets.GCP_PROJECT != '' }}" >> "$GITHUB_OUTPUT"

      - name: Skip notice
        if: steps.wif.outputs.configured != 'true'
        run: echo "::notice::GCP WIF secrets not configured (ISS-006 / issue #4) — skipping terraform plan."

      - uses: actions/checkout@v4
        if: steps.wif.outputs.configured == 'true'

      - uses: google-github-actions/auth@v2
        if: steps.wif.outputs.configured == 'true'
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_CI_SA }}

      - uses: hashicorp/setup-terraform@v3
        if: steps.wif.outputs.configured == 'true'
        with:
          terraform_wrapper: false

      - name: Terraform plan (config vs recorded state)
        if: steps.wif.outputs.configured == 'true'
        id: plan
        working-directory: ${{ env.ENV_DIR }}
        run: |
          terraform init -input=false -backend-config="bucket=${{ secrets.GCP_PROJECT }}-wave-tf-state"
          set +e
          terraform plan -input=false -refresh=false -lock=false -no-color > plan.txt 2>&1
          echo "exitcode=$?" >> "$GITHUB_OUTPUT"
          tail -c 60000 plan.txt > plan-trimmed.txt

      - name: Post plan as PR comment
        if: steps.wif.outputs.configured == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const dir = process.env.ENV_DIR;
            const plan = fs.readFileSync(`${dir}/plan-trimmed.txt`, 'utf8');
            const ok = '${{ steps.plan.outputs.exitcode }}' === '0';
            const marker = '<!-- terraform-plan-comment -->';
            const body = [
              marker,
              `## Terraform plan — \`${dir}\`${ok ? '' : ' — ❌ plan failed'}`,
              '_Config-only diff against recorded state (`-refresh=false`); live drift is not detected here._',
              '',
              '```',
              plan,
              '```',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo, issue_number: context.issue.number,
            });
            const prev = comments.find(c => c.body.includes(marker));
            if (prev) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: prev.id, body });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body });
            }

      - name: Fail job if plan errored
        if: steps.wif.outputs.configured == 'true' && steps.plan.outputs.exitcode != '0'
        run: exit 1
