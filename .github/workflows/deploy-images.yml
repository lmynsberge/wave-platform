# SPEC-016 R8: CI builds images; Terraform only references them.
# Auth: Workload Identity Federation — no key files. Setup in DEPLOY.md.
name: build-and-push-images
# Manual-dispatch only until CI→GCP auth is configured (see issues/ISS-006).
# Re-enable the push trigger below once GCP_WIF_PROVIDER / GCP_CI_SA / GCP_PROJECT
# repo secrets exist, otherwise every push to main fails on missing auth.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  #   paths: [server/**, core/**, web/**]

env:
  REGION: us-central1

jobs:
  images:
    runs-on: ubuntu-latest
    permissions: { contents: read, id-token: write }
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_CI_SA }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker $REGION-docker.pkg.dev -q
      - name: build+push server (includes web)
        run: |
          IMG=$REGION-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/wave/server:${GITHUB_SHA::12}
          docker build -f server/Dockerfile -t $IMG .
          docker push $IMG
      - name: build+push core
        run: |
          IMG=$REGION-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/wave/core:${GITHUB_SHA::12}
          docker build -t $IMG core
          docker push $IMG
