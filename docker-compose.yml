services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: wave
      POSTGRES_PASSWORD: wave
      POSTGRES_DB: wave
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wave"]
      interval: 5s
      timeout: 3s
      retries: 10

  core:
    build: ./core
    environment:
      CORE_PORT: "8081"
    ports: ["8081:8081"]

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      CORE_URL: http://core:8081
      PORT: "8080"
    ports: ["8080:8080"]
    depends_on: [core]

  web:
    build: ./web
    ports: ["5173:80"]
    depends_on: [server]

volumes:
  pgdata:
