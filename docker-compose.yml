services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: wave
      POSTGRES_PASSWORD: wave
      POSTGRES_DB: wave
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wave"]
      interval: 5s
      timeout: 3s
      retries: 10

  core:
    build: ./core
    environment:
      CORE_PORT: "8081"
      DATABASE_URL: postgres://wave:wave@postgres:5432/wave
    ports: ["8081:8081"]
    depends_on:
      postgres:
        condition: service_healthy

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      CORE_URL: http://core:8081
      PORT: "8080"
      DATABASE_URL: postgres://wave:wave@postgres:5432/wave
      DEMO_PERSONA_EMAIL: priya@meridian.demo
    ports: ["8080:8080"]
    depends_on: [core]

  web:
    build: ./web
    ports: ["5173:80"]
    depends_on: [server]

volumes:
  pgdata:
